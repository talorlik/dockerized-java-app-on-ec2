name: infra-apply

on:
  workflow_dispatch:
    inputs:
      purge_pending_secrets:
        description: >
          Force-delete any Secrets Manager secrets at the project's well-known
          paths that are currently in PendingDeletion state. Use only when a
          re-apply after `terraform destroy` is blocked by the 7-day recovery
          window. Safe to enable: skips healthy secrets.
        type: boolean
        required: false
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: infra-apply
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: prod
    # AWS CLI v2 pipes JSON through `less` by default. Act's medium image has
    # no `less`, causing aws shell-outs to exit 253. Disable pager job-wide so
    # every step (SLR creation, SSM put-parameter, S3 ops, terraform outputs)
    # gets the same defaulting on real GitHub runners and under act.
    env:
      AWS_PAGER: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Ensures `aws` is on PATH. GitHub-hosted ubuntu-latest already ships
      # AWS CLI v2; nektos/act's default medium image does not. Idempotent:
      # if `aws` is already present we just print the version and exit.
      - name: Ensure AWS CLI present
        shell: bash
        run: |
          set -euo pipefail
          if command -v aws >/dev/null 2>&1; then
            aws --version
            exit 0
          fi
          tmp=$(mktemp -d)
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "$tmp/awscliv2.zip"
          unzip -q "$tmp/awscliv2.zip" -d "$tmp"
          sudo "$tmp/aws/install" --update
          aws --version

      # Real GitHub runners only: assume DEPLOYMENT_ROLE_ARN via OIDC.
      # Skipped under `act` (env.ACT==true), where static AWS credentials are
      # already provided to the container via --env-file (.github/env.local).
      # Skipping prevents this action from clobbering the env-loaded creds and
      # from failing when no real OIDC token issuer is present.
      - uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        if: ${{ env.ACT != 'true' }}
        with:
          role-to-assume: ${{ secrets.DEPLOYMENT_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: gha-infra-apply

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.9.8

      # Opt-in: purge any project secrets stuck in PendingDeletion. Runs only
      # when the workflow is dispatched with `purge_pending_secrets=true`.
      # See .github/scripts/purge_pending_secrets.sh for the rationale.
      - name: Purge pending-deletion secrets (opt-in)
        if: ${{ inputs.purge_pending_secrets == 'true' }}
        run: |
          chmod +x .github/scripts/purge_pending_secrets.sh
          .github/scripts/purge_pending_secrets.sh

      # Pre-create AWS Service-Linked Roles before Terraform runs.
      # SLRs are account-wide singletons that Terraform does not manage; the
      # AWS API returns InvalidInput if they already exist, which `|| true`
      # swallows for idempotency. This eliminates the historical race where
      # ASG capacity validation fired before AWS auto-created the SLR.
      - name: Ensure AWS service-linked roles exist
        run: |
          set -euo pipefail
          for SVC in autoscaling.amazonaws.com elasticloadbalancing.amazonaws.com; do
            if out=$(aws iam create-service-linked-role --aws-service-name "$SVC" 2>&1); then
              echo "Created SLR for $SVC"
            else
              # Tolerate "already exists" only; surface anything else.
              if echo "$out" | grep -qiE 'has been taken in this account|already exists'; then
                echo "SLR for $SVC already exists; skipping."
              else
                echo "$out" >&2
                exit 1
              fi
            fi
          done

      - name: init
        working-directory: infra/envs/prod
        run: |
          terraform init \
            -backend-config="bucket=java-app-tfstate-${{ vars.DEPLOYMENT_ACCOUNT_ID }}-${{ vars.AWS_REGION }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: plan
        working-directory: infra/envs/prod
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_deployment_account_id: ${{ vars.DEPLOYMENT_ACCOUNT_ID }}
          TF_VAR_domain_account_id: ${{ vars.DOMAIN_ACCOUNT_ID }}
          TF_VAR_domain_account_route53_role_arn: ${{ secrets.DOMAIN_ROUTE53_ROLE_ARN }}
          TF_VAR_hosted_zone_id: ${{ vars.HOSTED_ZONE_ID }}
          TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN }}
        run: terraform plan -input=false -out=tfplan

      - name: apply
        working-directory: infra/envs/prod
        run: terraform apply -input=false -auto-approve tfplan

      - name: outputs
        working-directory: infra/envs/prod
        run: terraform output -no-color

      - name: Upload compose file to S3 (compose-object pointer)
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          set -euo pipefail
          BUCKET="java-app-prod-config-${{ vars.DEPLOYMENT_ACCOUNT_ID }}"

          # us-east-1 must NOT pass --create-bucket-configuration; every
          # other region requires LocationConstraint. The conditional avoids
          # the cryptic "InvalidLocationConstraint" / "IllegalLocationConstraint"
          # error in either direction.
          if [ "$AWS_REGION" = "us-east-1" ]; then
            CREATE_ARGS=(--bucket "$BUCKET" --region "$AWS_REGION")
          else
            CREATE_ARGS=(--bucket "$BUCKET" --region "$AWS_REGION" \
              --create-bucket-configuration "LocationConstraint=$AWS_REGION")
          fi

          # Retry loop. Conditions tolerated:
          #   BucketAlreadyOwnedByYou - bucket survives across infra cycles, success.
          #   OperationAborted        - bucket was just deleted, S3 still settling
          #                             (typical 30-60s after a recent infra-destroy).
          #   BucketAlreadyExists     - someone else owns the global name; fatal.
          # Any other error: fatal.
          for attempt in $(seq 1 30); do
            if out=$(aws s3api create-bucket "${CREATE_ARGS[@]}" 2>&1); then
              echo "compose bucket created."
              break
            fi
            case "$out" in
              *BucketAlreadyOwnedByYou*)
                echo "compose bucket already exists in this account; reusing."
                break
                ;;
              *OperationAborted*|*"A conflicting conditional operation"*)
                echo "post-delete settling (attempt $attempt/30); sleeping 10s"
                sleep 10
                ;;
              *BucketAlreadyExists*)
                echo "ERROR: bucket name $BUCKET is taken globally by another AWS account." >&2
                echo "$out" >&2
                exit 1
                ;;
              *)
                echo "ERROR: create-bucket failed:" >&2
                echo "$out" >&2
                exit 1
                ;;
            esac
          done

          aws s3api put-public-access-block --bucket "$BUCKET" \
            --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true
          aws s3 cp app/docker/docker-compose.prod.yml "s3://$BUCKET/docker-compose.prod.yml"
          # Compose-object SSM param is created by Terraform as SecureString
          # under alias/java-app-prod-secrets. Match the type/key-id explicitly
          # so put-parameter --overwrite cannot drift to plain String.
          aws ssm put-parameter --name "/java-app/prod/compose-object" \
            --type SecureString --key-id "alias/java-app-prod-secrets" --overwrite \
            --value "s3://$BUCKET/docker-compose.prod.yml"
