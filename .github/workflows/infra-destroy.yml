###############################################################################
# infra-destroy
#
# Tears down the entire prod env created by `infra/envs/prod`. Bootstrap
# state (S3 state bucket + KMS) is INTENTIONALLY left alone - destroying
# remote state bricks future restores and is almost never what you want.
#
# Sequence:
#   1. Confirm the user typed the destroy phrase exactly.
#   2. Optional pre-step: run app-layer cleanup (scale ASG to 0, purge ECR,
#      clear SSM release pointers, remove compose object) so the infra-side
#      destroy doesn't trip on protected resources. Idempotent.
#   3. Empty the ALB-logs bucket and the config bucket. Bucket policies
#      block plaintext puts, so a normal `aws s3 rm` won't always recurse;
#      we use s3api with versioning support.
#   4. Disable ALB deletion protection (TF can't destroy a protected ALB
#      and the resource attribute is set to `true` in module/alb.tf).
#   5. terraform init + destroy against `infra/envs/prod`.
#
# Run sparingly. The whole point of the bootstrap stack staying intact is
# that the next `infra-apply` rebuilds the env without you re-creating the
# state bucket.
###############################################################################
name: infra-destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DESTROY (uppercase) to confirm'
        required: true
        default: ''
      run_app_cleanup:
        description: 'First run app-layer cleanup (recommended)'
        type: boolean
        required: false
        default: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: infra-destroy
  cancel-in-progress: false

jobs:
  destroy:
    name: tear down infra
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_PAGER: ""
    steps:
      - name: Validate confirmation phrase
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "::error::confirm input must be exactly 'DESTROY'."
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Ensures `aws` is on PATH. GitHub-hosted ubuntu-latest already ships
      # AWS CLI v2; nektos/act's default medium image does not. Idempotent.
      - name: Ensure AWS CLI present
        shell: bash
        run: |
          set -euo pipefail
          if command -v aws >/dev/null 2>&1; then
            aws --version
            exit 0
          fi
          tmp=$(mktemp -d)
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "$tmp/awscliv2.zip"
          unzip -q "$tmp/awscliv2.zip" -d "$tmp"
          sudo "$tmp/aws/install" --update
          aws --version

      - uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          role-to-assume: ${{ secrets.DEPLOYMENT_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: gha-infra-destroy

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.9.8

      # -------------------------------------------------------------------
      # 2. App-layer cleanup (best-effort, idempotent).
      # -------------------------------------------------------------------
      - name: Resolve ASG name
        if: ${{ github.event.inputs.run_app_cleanup == 'true' }}
        id: asg
        run: |
          NAME=$(aws autoscaling describe-auto-scaling-groups \
            --query "AutoScalingGroups[?Tags[?Key=='Project' && Value=='java-app'] && Tags[?Key=='Environment' && Value=='prod']].AutoScalingGroupName | [0]" \
            --output text)
          if [ "$NAME" = "None" ] || [ -z "$NAME" ]; then NAME="java-app-prod-asg"; fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Scale ASG to 0
        if: ${{ github.event.inputs.run_app_cleanup == 'true' }}
        run: |
          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name "${{ steps.asg.outputs.name }}" \
            --min-size 0 --desired-capacity 0 --max-size 0 || true
          for i in $(seq 1 60); do
            COUNT=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-names "${{ steps.asg.outputs.name }}" \
              --query "AutoScalingGroups[0].Instances | length(@)" \
              --output text 2>/dev/null || echo "0")
            echo "in-service instances: $COUNT"
            if [ "$COUNT" = "0" ]; then break; fi
            sleep 15
          done

      - name: Purge ECR images
        if: ${{ github.event.inputs.run_app_cleanup == 'true' }}
        run: |
          for repo in java-app/backend java-app/frontend; do
            IDS=$(aws ecr list-images --repository-name "$repo" --query 'imageIds[*]' --output json 2>/dev/null || echo "[]")
            COUNT=$(echo "$IDS" | jq 'length')
            if [ "$COUNT" -gt 0 ]; then
              echo "$IDS" | jq -c '. as $a | range(0; ($a | length); 100) | $a[.:.+100]' | \
                while read -r CHUNK; do
                  aws ecr batch-delete-image --repository-name "$repo" --image-ids "$CHUNK" || true
                done
            fi
          done

      # -------------------------------------------------------------------
      # 3. Stop ALB from writing new logs, then disable deletion protection,
      #    then empty buckets that TF refuses to remove (versioned).
      # -------------------------------------------------------------------
      - name: Disable ALB access logs and deletion protection
        run: |
          set -euo pipefail
          ARN=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?starts_with(LoadBalancerName, 'java-app-prod-alb')].LoadBalancerArn | [0]" \
            --output text)
          if [ -n "$ARN" ] && [ "$ARN" != "None" ]; then
            aws elbv2 modify-load-balancer-attributes \
              --load-balancer-arn "$ARN" \
              --attributes Key=access_logs.s3.enabled,Value=false \
                           Key=deletion_protection.enabled,Value=false
          else
            echo "no ALB found - it may already be gone"
          fi

      - name: Empty ALB log bucket
        run: |
          set -euo pipefail
          B="java-app-prod-alb-logs-${{ vars.DEPLOYMENT_ACCOUNT_ID }}"
          if ! aws s3api head-bucket --bucket "$B" 2>/dev/null; then
            echo "bucket $B not present, skipping"
            exit 0
          fi
          # Paginate, build full delete payload in one jq call, stop when empty.
          while :; do
            PAYLOAD=$(aws s3api list-object-versions \
                        --bucket "$B" --max-items 900 --output json 2>/dev/null \
                      | jq -c '{Objects: [((.Versions // [])[]),
                                          ((.DeleteMarkers // [])[])
                                          | {Key, VersionId}],
                               Quiet: true}')
            COUNT=$(printf '%s' "$PAYLOAD" | jq '.Objects | length')
            [ "$COUNT" -eq 0 ] && break
            aws s3api delete-objects --bucket "$B" --delete "$PAYLOAD"
          done

      - name: Empty config (compose) bucket
        run: |
          set -euo pipefail
          B="java-app-prod-config-${{ vars.DEPLOYMENT_ACCOUNT_ID }}"
          if ! aws s3api head-bucket --bucket "$B" 2>/dev/null; then
            echo "bucket $B not present, skipping"
            exit 0
          fi
          while :; do
            PAYLOAD=$(aws s3api list-object-versions \
                        --bucket "$B" --max-items 900 --output json 2>/dev/null \
                      | jq -c '{Objects: [((.Versions // [])[]),
                                          ((.DeleteMarkers // [])[])
                                          | {Key, VersionId}],
                               Quiet: true}')
            COUNT=$(printf '%s' "$PAYLOAD" | jq '.Objects | length')
            [ "$COUNT" -eq 0 ] && break
            aws s3api delete-objects --bucket "$B" --delete "$PAYLOAD"
          done

      # -------------------------------------------------------------------
      # 5. Terraform init, then RDS prep, then destroy.
      # -------------------------------------------------------------------
      # Pre-create AWS Service-Linked Roles. They are no longer managed by
      # Terraform, but covering the case where someone deleted them
      # out-of-band keeps `terraform plan -destroy` from failing on missing
      # IAM principals referenced by leftover ASG/ALB resources.
      - name: Ensure AWS service-linked roles exist
        run: |
          set -euo pipefail
          for SVC in autoscaling.amazonaws.com elasticloadbalancing.amazonaws.com; do
            if out=$(aws iam create-service-linked-role --aws-service-name "$SVC" 2>&1); then
              echo "Created SLR for $SVC"
            else
              if echo "$out" | grep -qiE 'has been taken in this account|already exists'; then
                echo "SLR for $SVC already exists; skipping."
              else
                echo "$out" >&2
                exit 1
              fi
            fi
          done

      - name: terraform init
        working-directory: infra/envs/prod
        run: |
          terraform init \
            -backend-config="bucket=java-app-tfstate-${{ vars.DEPLOYMENT_ACCOUNT_ID }}-${{ vars.AWS_REGION }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      # Disable RDS deletion protection imperatively, let any in-flight
      # modify settle, and purge orphan retained automated backups left
      # from prior failed destroys (those pin the parameter group's KMS
      # key and bloat backup quota).
      - name: Prepare RDS for destroy
        run: |
          set -euo pipefail
          DBI="java-app-prod-mysql"

          if aws rds describe-db-instances --db-instance-identifier "$DBI" >/dev/null 2>&1; then
            aws rds modify-db-instance \
              --db-instance-identifier "$DBI" \
              --no-deletion-protection \
              --apply-immediately >/dev/null
            # Wait up to ~30 min for available; ignore terminal failures.
            aws rds wait db-instance-available \
              --db-instance-identifier "$DBI" || true
          else
            echo "RDS instance $DBI not present"
          fi

          # Purge any retained automated backups for this DBI. delete_automated_backups
          # only fires inside DeleteDBInstance; orphans from earlier runs need this.
          aws rds describe-db-instance-automated-backups \
            --query "DBInstanceAutomatedBackups[?DBInstanceIdentifier=='$DBI'].DBInstanceAutomatedBackupsArn" \
            --output text | tr '\t' '\n' | while read -r ARN; do
              [ -z "$ARN" ] && continue
              echo "deleting orphan automated backup $ARN"
              aws rds delete-db-instance-automated-backup \
                --db-instance-automated-backups-arn "$ARN" || true
            done

      - name: terraform destroy
        working-directory: infra/envs/prod
        env:
          TF_VAR_aws_region: ${{ vars.AWS_REGION }}
          TF_VAR_deployment_account_id: ${{ vars.DEPLOYMENT_ACCOUNT_ID }}
          TF_VAR_domain_account_id: ${{ vars.DOMAIN_ACCOUNT_ID }}
          TF_VAR_domain_account_route53_role_arn: ${{ secrets.DOMAIN_ROUTE53_ROLE_ARN }}
          TF_VAR_hosted_zone_id: ${{ vars.HOSTED_ZONE_ID }}
          TF_VAR_acm_certificate_arn: ${{ secrets.ACM_CERTIFICATE_ARN }}
          TF_VAR_rds_deletion_protection: "false"
          TF_VAR_rds_skip_final_snapshot: "true"
          TF_VAR_rds_delete_automated_backups: "true"
          TF_VAR_alb_logs_force_destroy: "true"
        run: |
          terraform destroy -input=false -auto-approve
