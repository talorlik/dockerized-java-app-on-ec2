name: ci

on:
  workflow_dispatch:
  # Allow other workflows (e.g. app-deploy) to use this as a quality gate.
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Backend unit + integration tests (Testcontainers MySQL)
        working-directory: app/backend
        env:
          # Explicit DOCKER_HOST removes ambiguity in docker-java's discovery
          # path. github-hosted ubuntu-latest exposes the daemon socket here;
          # act mounts the host's daemon socket here when --container-daemon-
          # socket is the default.
          DOCKER_HOST: unix:///var/run/docker.sock
          # Ryuk is testcontainers' cleanup sidecar. It works fine on full
          # github-hosted VMs but is unreliable when the daemon is reached
          # via a bind-mounted socket from inside an act container (Ryuk
          # tracks the test process's PID against the host PID namespace).
          # Disabling Ryuk in ephemeral CI is safe and standard practice.
          TESTCONTAINERS_RYUK_DISABLED: "true"
        # ./mvnw resolves Maven 3.9.9 from .mvn/wrapper/maven-wrapper.properties.
        # Works on github-hosted runners and on nektos/act images that lack
        # a system mvn. The chmod is defensive: if git failed to preserve the
        # +x bit (Windows clones with core.fileMode=false, archive downloads,
        # certain fs imports), the wrapper still runs. No-op when already +x.
        #
        # `act` exports ACT=true automatically. Under act we run Surefire only
        # (`test`) and skip Failsafe/Testcontainers ITs because the slim
        # catthehacker runner image's docker CLI ships an old default API
        # version that OrbStack/modern Docker Engine reject ("client version
        # 1.32 is too old. Minimum supported API version is 1.40"), and
        # neither setting DOCKER_API_VERSION nor pinning docker-java 3.7.1
        # via the BOM was enough to make the docker-java client send a
        # modern Api-Version on this code path. ITs still run unmodified on
        # github-hosted ubuntu-latest, where the daemon is fresh enough.
        # Remove the conditional once a known-good combination of testcontainers
        # / docker-java / act runner image is verified end-to-end locally.
        run: |
          chmod +x ./mvnw
          if [ "${ACT:-}" = "true" ]; then
            echo "Detected ACT=${ACT}; running Surefire only (skipping Failsafe ITs)."
            ./mvnw -B -ntp test
          else
            ./mvnw -B -ntp verify
          fi

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: backend-test-reports
          path: |
            app/backend/target/surefire-reports/**
            app/backend/target/failsafe-reports/**

  frontend:
    name: frontend lint/build (no-op for vanilla JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Sanity check static assets
        run: |
          test -f app/frontend/src/index.html
          test -f app/frontend/nginx.conf

  compose-smoke:
    name: docker compose smoke + playwright
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build images and start compose stack
        working-directory: app/docker
        run: |
          docker compose -f docker-compose.local.yml build
          docker compose -f docker-compose.local.yml up -d
          docker compose -f docker-compose.local.yml ps

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/actuator/health; then
              echo
              echo "backend ready"
              exit 0
            fi
            sleep 5
          done
          echo "backend never became healthy"
          docker compose -f app/docker/docker-compose.local.yml logs --no-color || true
          exit 1

      - name: Setup Node + Playwright
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install + run Playwright
        working-directory: tests/e2e
        env:
          E2E_BASE_URL: http://localhost:8080
        run: |
          npm install
          npx playwright install --with-deps chromium
          npm run test:ci

      - name: Compose logs (always)
        if: always()
        working-directory: app/docker
        run: docker compose -f docker-compose.local.yml logs --no-color || true

      - name: Compose down
        if: always()
        working-directory: app/docker
        run: docker compose -f docker-compose.local.yml down -v

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: playwright-report
          path: tests/e2e/playwright-report

  iac-checks:
    name: terraform fmt/validate + tflint + checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.9.8

      - name: terraform fmt
        run: terraform fmt -check -recursive infra

      - name: validate bootstrap
        working-directory: infra/bootstrap
        run: terraform init -backend=false && terraform validate

      - name: validate prod
        working-directory: infra/envs/prod
        run: terraform init -backend=false && terraform validate

      - uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with: { tflint_version: latest }
      - run: tflint --init && tflint --recursive

      - name: checkov
        uses: bridgecrewio/checkov-action@9201a8e6eaa919e3444d7c4ca691896efde4f033 # v12
        with:
          directory: infra
          framework: terraform
          soft_fail: true
