name: ci

on:
  workflow_dispatch:
  # Allow other workflows (e.g. app-deploy) to use this as a quality gate.
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-drift:
    name: docs drift guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run docs drift check script
        run: |
          chmod +x .github/scripts/docs_drift_check.sh
          .github/scripts/docs_drift_check.sh

  backend:
    name: backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Backend unit + integration tests (Testcontainers MySQL)
        working-directory: app/backend
        env:
          # Explicit DOCKER_HOST removes ambiguity in docker-java's discovery
          # path. github-hosted ubuntu-latest exposes the daemon socket here;
          # act mounts the host's daemon socket here when --container-daemon-
          # socket is the default.
          DOCKER_HOST: unix:///var/run/docker.sock
          # Ryuk is testcontainers' cleanup sidecar. It works fine on full
          # github-hosted VMs but is unreliable when the daemon is reached
          # via a bind-mounted socket from inside an act container (Ryuk
          # tracks the test process's PID against the host PID namespace).
          # Disabling Ryuk in ephemeral CI is safe and standard practice.
          TESTCONTAINERS_RYUK_DISABLED: "true"
        # ./mvnw resolves Maven 3.9.9 from .mvn/wrapper/maven-wrapper.properties.
        # Works on github-hosted runners and on nektos/act images that lack
        # a system mvn. The chmod is defensive: if git failed to preserve the
        # +x bit (Windows clones with core.fileMode=false, archive downloads,
        # certain fs imports), the wrapper still runs. No-op when already +x.
        #
        # Failsafe + Testcontainers ITs run unconditionally. The previously
        # documented act-only short-circuit to Surefire-only existed to dodge
        # the slim catthehacker image's stale docker CLI (API floor 1.32 vs
        # the daemon's 1.40 minimum). `.actrc` now pins
        # catthehacker/ubuntu:full-22.04, which ships a current docker CLI,
        # so the workaround is no longer required.
        #
        # Under act the JVM runs inside the runner container while every
        # Testcontainers-spawned container (MySQL here) is a sibling on the
        # host docker daemon (socket is bind-mounted, not nested). Mapped
        # ports publish to the daemon host's loopback, not to the runner
        # container's loopback, so testcontainers' default
        # `getHost() = localhost` resolution would fail. Setting
        # TESTCONTAINERS_HOST_OVERRIDE to `host.docker.internal` only when
        # ACT is set forces mapped-port resolution at the daemon host. On
        # github-hosted runners ACT is unset, the export is skipped, and
        # testcontainers' default `getHost()` is used. The
        # `host.docker.internal` alias is injected into every container's
        # /etc/hosts natively by Docker Desktop and OrbStack on macOS;
        # plain Linux Docker Engine daemons need a `--add-host` (see the
        # `.actrc` header for the CLI invocation).
        run: |
          chmod +x ./mvnw
          if [ "${ACT:-}" = "true" ]; then
            export TESTCONTAINERS_HOST_OVERRIDE=host.docker.internal
          fi
          ./mvnw -B -ntp verify

      - name: Upload surefire reports
        # Uploads to the GitHub-hosted artifact backend on real CI.
        # Skipped under act: `actions/upload-artifact@v6` negotiates with
        # the GitHub Actions Results Service, which act's emulated
        # `--artifact-server-path` does not yet implement for the v6
        # receiver path; the upload returns 401 unauthorized and fails
        # the job. Locally, surefire/failsafe XML is still on disk under
        # app/backend/target/{surefire,failsafe}-reports/ via the bind
        # mount. `always()` keeps reports captured on real CI even when
        # the test step exits non-zero.
        if: ${{ always() && !env.ACT }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: backend-test-reports
          path: |
            app/backend/target/surefire-reports/**
            app/backend/target/failsafe-reports/**

  frontend:
    name: frontend lint/build (no-op for vanilla JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Sanity check static assets
        run: |
          test -f app/frontend/src/index.html
          test -f app/frontend/nginx.conf

  compose-smoke:
    name: docker compose smoke + playwright
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Resolves the host that subsequent steps use to reach the compose
      # stack and the backend.
      #
      # `docker compose up` from inside the act runner targets the host's
      # docker daemon (socket is bind-mounted). Compose containers publish
      # their ports to the daemon host's loopback, which is reachable from
      # the runner container as `host.docker.internal` - an alias injected
      # natively by Docker Desktop and OrbStack on macOS, and addable via
      # `--add-host` on plain Linux daemons (see `.actrc` header). On
      # github-hosted runners the runner IS the host, so plain `localhost`
      # works; ACT is unset there and the else branch is selected.
      #
      # Job/workflow-level `env:` blocks cannot reference the `env`
      # context (would be self-referential and is rejected by the
      # GitHub Actions / act schema validator). Resolving the values in
      # a shell step that writes to `$GITHUB_ENV` is the canonical
      # workaround and exposes BACKEND_HOST + E2E_BASE_URL to every
      # subsequent step in the job without any expression voodoo.
      - name: Resolve runtime backend host
        run: |
          if [ "${ACT:-}" = "true" ]; then
            echo "BACKEND_HOST=host.docker.internal"            >> "$GITHUB_ENV"
            echo "E2E_BASE_URL=http://host.docker.internal:8080" >> "$GITHUB_ENV"
          else
            echo "BACKEND_HOST=localhost"                        >> "$GITHUB_ENV"
            echo "E2E_BASE_URL=http://localhost:8080"            >> "$GITHUB_ENV"
          fi

      - name: Build images and start compose stack
        working-directory: app/docker
        run: |
          docker compose -f docker-compose.local.yml build
          docker compose -f docker-compose.local.yml up -d
          docker compose -f docker-compose.local.yml ps

      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS "http://${BACKEND_HOST}:8080/actuator/health"; then
              echo
              echo "backend ready"
              exit 0
            fi
            sleep 5
          done
          echo "backend never became healthy"
          docker compose -f app/docker/docker-compose.local.yml logs --no-color || true
          exit 1

      - name: Setup Node + Playwright
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Install + run Playwright
        working-directory: tests/e2e
        # E2E_BASE_URL is exported via `$GITHUB_ENV` in the
        # "Resolve runtime backend host" step; Playwright's config picks
        # it up from the process env, so no per-step env block is needed.
        run: |
          npm install
          npx playwright install --with-deps chromium
          npm run test:ci

      - name: Compose logs (always)
        if: always()
        working-directory: app/docker
        run: docker compose -f docker-compose.local.yml logs --no-color || true

      - name: Compose down
        if: always()
        working-directory: app/docker
        run: docker compose -f docker-compose.local.yml down -v

      - name: Upload Playwright report
        # Uploads to the GitHub-hosted artifact backend on real CI.
        # Skipped under act: same v6 receiver incompatibility as the
        # backend surefire upload above. Locally, the HTML report is on
        # disk at tests/e2e/playwright-report/ via the bind mount.
        # `always()` keeps it captured on real CI even when test steps
        # exit non-zero.
        if: ${{ always() && !env.ACT }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: playwright-report
          path: tests/e2e/playwright-report

  iac-checks:
    name: terraform fmt/validate + tflint + checkov
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.9.8

      - name: terraform fmt
        run: terraform fmt -check -recursive infra

      - name: validate bootstrap
        working-directory: infra/bootstrap
        run: terraform init -backend=false && terraform validate

      - name: validate prod
        working-directory: infra/envs/prod
        run: terraform init -backend=false && terraform validate

      - uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with: { tflint_version: latest }
      - run: tflint --init && tflint --recursive

      - name: checkov
        uses: bridgecrewio/checkov-action@9201a8e6eaa919e3444d7c4ca691896efde4f033 # v12
        with:
          directory: infra
          framework: terraform
          soft_fail: true
