name: app-deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Override image tag (defaults to commit SHA)"
        required: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: app-deploy
  cancel-in-progress: false

jobs:
  build-test:
    name: build + test (gate)
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy:
    name: build, push, refresh
    needs: build-test
    runs-on: ubuntu-latest
    environment: prod
    env:
      AWS_PAGER: ""
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Ensures `aws` is on PATH. GitHub-hosted ubuntu-latest already ships
      # AWS CLI v2; nektos/act's default medium image does not. Idempotent.
      - name: Ensure AWS CLI present
        shell: bash
        run: |
          set -euo pipefail
          if command -v aws >/dev/null 2>&1; then
            aws --version
            exit 0
          fi
          tmp=$(mktemp -d)
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "$tmp/awscliv2.zip"
          unzip -q "$tmp/awscliv2.zip" -d "$tmp"
          sudo "$tmp/aws/install" --update
          aws --version

      # Real GitHub runners only: assume DEPLOYMENT_ROLE_ARN via OIDC.
      # Skipped under `act` (env.ACT==true), where static AWS credentials are
      # already provided to the container via --env-file (.github/env.local).
      # Skipping prevents this action from clobbering the env-loaded creds and
      # from failing when no real OIDC token issuer is present.
      - uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        if: ${{ env.ACT != 'true' }}
        with:
          role-to-assume: ${{ secrets.DEPLOYMENT_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: gha-app-deploy

      - id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then TAG="sha-${GITHUB_SHA::12}"; fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # Real GitHub runners only. The action's JS path performs
      # GetAuthorizationToken + `docker login` and registers a Post step that
      # logs out at job end. Under `act`, switch to a shell login below to
      # avoid the action's HOME/credential-helper edge cases inside the
      # catthehacker runner image.
      - uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7 # v2.1.4
        if: ${{ env.ACT != 'true' }}
        id: ecr
        with:
          registries: ${{ vars.DEPLOYMENT_ACCOUNT_ID }}

      # `act`-only fallback. Uses the AWS CLI installed by the previous step
      # and the static creds loaded from .github/env.local. Writes plain
      # base64 `auths` entries into $HOME/.docker/config.json, which is what
      # docker push in subsequent steps reads. No Post-step logout under act
      # by design - the runner container is ephemeral.
      - name: ECR docker login (act fallback)
        if: ${{ env.ACT == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          aws ecr get-login-password --region "${{ vars.AWS_REGION }}" \
            | docker login \
                --username AWS \
                --password-stdin \
                "${{ vars.DEPLOYMENT_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com"

      - name: Resolve ECR repo URLs
        id: repos
        run: |
          ACC="${{ vars.DEPLOYMENT_ACCOUNT_ID }}"
          REG="${{ vars.AWS_REGION }}"
          echo "backend=$ACC.dkr.ecr.$REG.amazonaws.com/java-app/backend"   >> $GITHUB_OUTPUT
          echo "frontend=$ACC.dkr.ecr.$REG.amazonaws.com/java-app/frontend" >> $GITHUB_OUTPUT

      - name: Build + push backend
        run: |
          docker build -t ${{ steps.repos.outputs.backend }}:${{ steps.tag.outputs.tag }} app/backend
          docker push ${{ steps.repos.outputs.backend }}:${{ steps.tag.outputs.tag }}

      - name: Build + push frontend
        run: |
          docker build -t ${{ steps.repos.outputs.frontend }}:${{ steps.tag.outputs.tag }} app/frontend
          docker push ${{ steps.repos.outputs.frontend }}:${{ steps.tag.outputs.tag }}

      - name: Update SSM release params
        # Parameters are created by Terraform as SecureString under the
        # app-secrets CMK (alias/java-app-prod-secrets). --overwrite preserves
        # the existing type/key when neither --type nor --key-id is passed,
        # but we set them explicitly so a put-parameter against a (re-)created
        # param still lands as SecureString.
        run: |
          KMS_ALIAS="alias/java-app-prod-secrets"
          aws ssm put-parameter --name "/java-app/prod/backend-image-tag"  --type SecureString --key-id "$KMS_ALIAS" --overwrite --value "${{ steps.tag.outputs.tag }}"
          aws ssm put-parameter --name "/java-app/prod/frontend-image-tag" --type SecureString --key-id "$KMS_ALIAS" --overwrite --value "${{ steps.tag.outputs.tag }}"
          aws ssm put-parameter --name "/java-app/prod/release-id"         --type SecureString --key-id "$KMS_ALIAS" --overwrite --value "${{ github.sha }}"

      # ------------------------------------------------------------------
      # Publish docker-compose.prod.yml to the config bucket.
      #
      # `app-destroy` deletes this object as part of tearing down the app
      # layer, so a deploy must always re-publish it before instances boot.
      # SSE-KMS uses the existing app-secrets CMK so the bucket policy
      # (kms-only PutObject) accepts the upload.
      # The step is idempotent: a no-op when the bucket already holds an
      # identical object (S3 still records a new version because the bucket
      # is versioned, but the cost is trivial and it removes the destroy/
      # deploy ordering hazard).
      # ------------------------------------------------------------------
      - name: Publish docker-compose.prod.yml to S3
        run: |
          BUCKET="java-app-prod-config-${{ vars.DEPLOYMENT_ACCOUNT_ID }}"
          aws s3 cp app/docker/docker-compose.prod.yml \
            "s3://$BUCKET/docker-compose.prod.yml" \
            --sse aws:kms \
            --sse-kms-key-id alias/java-app-prod-secrets

      - name: Resolve ASG name
        id: asg
        run: |
          NAME=$(aws autoscaling describe-auto-scaling-groups \
            --query "AutoScalingGroups[?Tags[?Key=='Project' && Value=='java-app'] && Tags[?Key=='Environment' && Value=='prod']].AutoScalingGroupName | [0]" \
            --output text)
          if [ "$NAME" = "None" ] || [ -z "$NAME" ]; then
            # Fallback to deterministic name pattern
            NAME="java-app-prod-asg"
          fi
          echo "name=$NAME" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------------
      # Re-arm ASG capacity if `app-destroy` (or any operator) scaled it
      # to 0/0/0. Without this step a deploy after a destroy is a silent
      # no-op: instance-refresh on an empty ASG returns Successful with
      # InstancesToUpdate=0 and the post-deploy smoke 503s against an
      # empty target group.
      #
      # Capacity targets are read from SSM parameters owned by Terraform
      # (var.asg_min_size / var.asg_desired_capacity / var.asg_max_size,
      # surfaced as /java-app/prod/asg/{min-size,desired-capacity,max-size}).
      # Hardcoded fallbacks to 2/2/6 cover the cold-start case before the
      # first apply that introduced these parameters.
      #
      # Output `scaled_from_zero` is consumed by the refresh steps below:
      # when true, fresh instances launched by the scale-up are already on
      # the latest LT and an instance refresh would needlessly cycle them.
      # ------------------------------------------------------------------
      - name: Re-arm ASG capacity if at zero
        id: rearm
        run: |
          set -euo pipefail
          NAME="${{ steps.asg.outputs.name }}"

          # Read canonical capacity from SSM (terraform-managed). Each lookup
          # falls back to its hardcoded default if the parameter isn't there
          # yet (first deploy after this change, before terraform apply).
          ssm_get() {
            aws ssm get-parameter --name "$1" --query 'Parameter.Value' --output text 2>/dev/null || echo ""
          }
          MIN=$(ssm_get /java-app/prod/asg/min-size);         MIN="${MIN:-2}"
          DES=$(ssm_get /java-app/prod/asg/desired-capacity); DES="${DES:-2}"
          MAX=$(ssm_get /java-app/prod/asg/max-size);         MAX="${MAX:-6}"
          echo "target capacity (from SSM/defaults): min=$MIN desired=$DES max=$MAX"

          read -r CUR_MIN CUR_DES CUR_MAX <<< "$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$NAME" \
            --query 'AutoScalingGroups[0].[MinSize,DesiredCapacity,MaxSize]' \
            --output text)"
          echo "current min=$CUR_MIN desired=$CUR_DES max=$CUR_MAX"
          if [ "$CUR_MIN" = "0" ] && [ "$CUR_DES" = "0" ] && [ "$CUR_MAX" = "0" ]; then
            echo "ASG is at 0/0/0; scaling to $MIN/$DES/$MAX"
            aws autoscaling update-auto-scaling-group \
              --auto-scaling-group-name "$NAME" \
              --min-size "$MIN" --desired-capacity "$DES" --max-size "$MAX"
            echo "scaled_from_zero=true"  >> "$GITHUB_OUTPUT"
          else
            echo "scaled_from_zero=false" >> "$GITHUB_OUTPUT"
          fi

      # Skipped when we just scaled from 0: the new instances launched by
      # the scale-up are already on the current launch template version.
      - name: Trigger ASG instance refresh
        id: refresh
        if: steps.rearm.outputs.scaled_from_zero != 'true'
        run: |
          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "${{ steps.asg.outputs.name }}" \
            --preferences '{"MinHealthyPercentage":100,"MaxHealthyPercentage":200,"InstanceWarmup":300,"AutoRollback":false}' \
            --query 'InstanceRefreshId' --output text)
          echo "id=$REFRESH_ID" >> $GITHUB_OUTPUT

      - name: Wait for refresh to complete
        if: steps.rearm.outputs.scaled_from_zero != 'true'
        run: |
          set -e
          for i in $(seq 1 90); do
            S=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "${{ steps.asg.outputs.name }}" \
              --instance-refresh-ids "${{ steps.refresh.outputs.id }}" \
              --query 'InstanceRefreshes[0].Status' --output text)
            P=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "${{ steps.asg.outputs.name }}" \
              --instance-refresh-ids "${{ steps.refresh.outputs.id }}" \
              --query 'InstanceRefreshes[0].PercentageComplete' --output text)
            echo "refresh status=$S percent=$P"
            case "$S" in
              Successful) exit 0 ;;
              Failed|Cancelled|RollbackFailed|RollbackSuccessful)
                echo "refresh ended with $S"; exit 1 ;;
            esac
            sleep 20
          done
          echo "timed out waiting for refresh"
          exit 1

      # ------------------------------------------------------------------
      # Gate the smoke on actual ALB target health, not on instance-refresh
      # status. This prevents the 503 race from re-occurring: refresh can
      # report Successful before targets stabilise, and (worse) refresh on
      # an empty ASG returns Successful instantly.
      # 60 * 15s = 900s ceiling: covers cold-boot user-data (4-7 min) +
      # ELB unhealthy threshold (3 * 15s = 45s) + slack.
      # ------------------------------------------------------------------
      - name: Resolve target group ARN
        id: tg
        run: |
          NAME="${{ steps.asg.outputs.name }}"
          TG_ARN=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "$NAME" \
            --query 'AutoScalingGroups[0].TargetGroupARNs[0]' --output text)
          echo "arn=$TG_ARN" >> "$GITHUB_OUTPUT"

      - name: Wait for target group healthy
        run: |
          set -e
          for i in $(seq 1 60); do
            HEALTHY=$(aws elbv2 describe-target-health \
              --target-group-arn "${{ steps.tg.outputs.arn }}" \
              --query "length(TargetHealthDescriptions[?TargetHealth.State=='healthy'])" \
              --output text)
            TOTAL=$(aws elbv2 describe-target-health \
              --target-group-arn "${{ steps.tg.outputs.arn }}" \
              --query "length(TargetHealthDescriptions[*])" \
              --output text)
            echo "TG healthy=$HEALTHY total=$TOTAL"
            if [ "$HEALTHY" -ge 1 ]; then exit 0; fi
            sleep 15
          done
          echo "no healthy targets in target group after 900s"
          exit 1

      - name: Post-deploy smoke
        run: |
          # 72 * 10s = 720s. TG-health gate above already proves at least
          # one target is healthy; this loop additionally confirms the
          # public ALB FQDN serves a 200 with status=UP, covering DNS
          # propagation and listener-rule configuration.
          for i in $(seq 1 72); do
            if curl -fsS --max-time 10 "https://java.talorlik.com/actuator/health" | grep -q '"status":"UP"'; then
              echo "smoke ok"; exit 0
            fi
            sleep 10
          done
          echo "smoke failed"; exit 1
