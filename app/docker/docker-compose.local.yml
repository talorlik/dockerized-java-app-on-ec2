###############################################################################
# Local development / CI compose file.
#
# Brings up MySQL alongside backend + frontend so smoke tests work without
# touching AWS. NOT for production use - prod uses RDS.
###############################################################################

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: javaapp
      MYSQL_USER: appuser
      MYSQL_PASSWORD: localdevpass
      MYSQL_ROOT_PASSWORD: localrootpass
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    build:
      context: ../backend
    image: java-app/backend:dev
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: javaapp
      DB_USERNAME: appuser
      DB_PASSWORD: localdevpass
      SES_ENABLED: "false"
      JWT_SECRET_NAME: disabled-local
      SES_SECRET_NAME: disabled-local
      ADMIN_SECRET_NAME: disabled-local
      APP_PUBLIC_URL: http://localhost:8080
      # AWS_REGION is still consumed by the SES/SecretsManager client builders
      # in AwsConfig even though, under the local profile, neither client
      # actually performs a network call. Keep a default so the bean wires.
      AWS_REGION: ${AWS_REGION:-us-east-1}
      # Local profile uses InlineJwtSecretProvider. Override JWT_INLINE_KEY at
      # the host shell to pin the signing key across runs; otherwise the
      # placeholder in application-local.yml is used.
      JWT_INLINE_KEY: ${JWT_INLINE_KEY:-dev-only-not-a-real-key-32bytes-minimum-xx}
      SPRING_PROFILES_ACTIVE: local
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 3s
      retries: 30
      start_period: 60s
    expose:
      - "8080"

  frontend:
    build:
      context: ../frontend
    image: java-app/frontend:dev
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
