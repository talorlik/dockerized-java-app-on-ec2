spring:
  application:
    name: java-app-backend
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:javaapp}?useSSL=true&requireSSL=false&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8
    username: ${DB_USERNAME:appuser}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.dialect: org.hibernate.dialect.MySQLDialect
      hibernate.jdbc.batch_size: 25
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  forward-headers-strategy: framework
  error:
    include-stacktrace: never
    include-message: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
  health:
    db:
      enabled: true

logging:
  level:
    root: INFO
    com.talorlik.javaapp: INFO
    org.springframework.security: INFO

app:
  aws:
    region: ${AWS_REGION:us-east-1}
  secrets:
    jwt-secret-name: ${JWT_SECRET_NAME:/java-app/prod/jwt}
    ses-secret-name: ${SES_SECRET_NAME:/java-app/prod/ses}
    admin-secret-name: ${ADMIN_SECRET_NAME:/java-app/prod/admin}
  jwt:
    expiration-minutes: 60
  verification:
    code-length: 6
    ttl-minutes: 30
    max-attempts: 5
  rate-limit:
    login-per-minute: 10
    verify-per-minute: 10
    signup-per-hour: 20
  cors:
    allowed-origin: ${APP_PUBLIC_URL:https://java.talorlik.com}
  ses:
    enabled: ${SES_ENABLED:true}
